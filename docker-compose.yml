version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartshelfx-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smartshelfx
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smartshelfx-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: smartshelfx
      JWT_SECRET: smartshelfx_jwt_secret_key_2024_prod
      JWT_EXPIRES_IN: 24h
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:4200
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    container_name: smartshelfx-ai
    restart: always
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: smartshelfx-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql-data:
